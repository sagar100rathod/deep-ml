name: Documentation Build Check

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'deepml/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'deepml/**'
  workflow_dispatch:

jobs:
  validate-docs:
    name: Validate Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: ${{ runner.os }}-poetry-docs-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-docs-

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "2.2.1"

      - name: Install dependencies
        run: poetry install --no-interaction --extras dev

      - name: Generate API documentation
        run: make docs-api

      - name: Build HTML documentation
        run: make docs-build

      - name: Check for build warnings
        run: |
          if grep -i "warning" docs/build/html/.buildinfo 2>/dev/null; then
            echo "⚠️  Documentation build completed with warnings"
            exit 0
          else
            echo "✅ Documentation build completed successfully"
          fi

      - name: Upload documentation artifacts (for review)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-preview
          path: docs/build/html/
          retention-days: 7
